name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Required by contributor-assistant/github-action to comment on PRs and
# commit signature updates to the cla-signatures branch.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/cs-util-com/location-based-webxr/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "cs-util-com,dependabot[bot]"
          # Sentence the contributor must comment on the PR to record their signature.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thanks for your contribution! Before we can merge this pull request, please sign our [Contributor License Agreement](https://github.com/cs-util-com/location-based-webxr/blob/main/CLA.md) by posting the following comment on this PR:"
          custom-allsigned-prcomment: "All Contributors have signed the CLA. ✅"
