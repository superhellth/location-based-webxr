name = "gps-plus-slam"
compatibility_date = "2026-04-28"

# Static-site deploy. Cloudflare's Git integration runs the build first
# (`pnpm run build:site`), which writes the combined multi-app output to
# ./dist-site (landing page at /, recorder at /recorder/, starter at /starter/),
# then this config tells `wrangler versions upload` where to find the assets.
# No Worker script is involved.
[assets]
directory = "./dist-site"

# Observability settings for logging and debugging.
# Enabled via Cloudflare Dashboard - logs persist for debugging deployments.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
