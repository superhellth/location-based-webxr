<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gps-plus-slam-js — minimal example</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      #ar-root {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 1;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid #333;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-line;
        max-width: min(70vw, 480px);
      }
      #enter-ar {
        position: fixed;
        left: 50%;
        bottom: 32px;
        transform: translateX(-50%);
        z-index: 2;
        padding: 12px 20px;
        font-size: 15px;
        font-family: inherit;
        color: #eee;
        background: #2b6cff;
        border: 1px solid #4f8cff;
        border-radius: 8px;
        cursor: pointer;
      }
      #enter-ar:disabled {
        background: #333;
        border-color: #444;
        color: #999;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <!--
      #status and #enter-ar MUST be descendants of #ar-root (the element passed
      to initAR). Under the WebXR DOM Overlay feature only the initAR container's
      subtree composites over the AR camera feed; a sibling overlay vanishes once
      AR starts. See the repo-meta guard
      tests/repo-config/hud-overlay-nesting.test.js and the AppFramework README
      "DOM-Overlay / HUD stacking convention".
    -->
    <div id="ar-root">
      <pre id="status" data-testid="status">loading…</pre>
      <button id="enter-ar" type="button" disabled>Checking AR support…</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
